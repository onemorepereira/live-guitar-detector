# Combined dev + prod docker-compose stack.
#
# Profiles:
#   dev   → bind-mounted source, Dockerfile.dev, hot-reload.
#   prod  → built production images (services/{gateway,inference-worker}/
#           Dockerfile), no source bind-mounts.
#
# Usage:
#   make dev    → docker compose --profile dev up --build
#   make prod   → docker compose --profile prod up --build
#
# `redis` is untagged so it joins whichever profile is active.
#
# Dev frontend: NOT containerized — run on the host with
#     cd services/frontend && npm run dev
# (Vite proxies /api and /ws to localhost:8000). In prod the frontend
# bundle is baked into the gateway image (Task 3.2), so nothing extra
# to start.
#
# Models for the dev worker are bind-mounted from
# services/inference-worker/app/models (populated by Task 1.5). The prod
# worker image bakes them at /models (Task 3.3).
# Prompts are bind-mounted from docs/prompts.md in both profiles; the
# prompts loader (Task 1.4) extracts the YAML block from a .md file
# when the path ends in `.md`, which is why PROMPTS_FILE overrides the
# DESIGN.md default of /config/prompts.yaml.

services:
  redis:
    image: redis:7.2-alpine
    ports:
      - "6379:6379"
    command:
      [
        "redis-server",
        "--maxmemory",
        "256mb",
        "--maxmemory-policy",
        "allkeys-lru",
        "--appendonly",
        "no",
      ]
    networks:
      - internal

  # ---- dev profile ----
  gateway:
    profiles: ["dev"]
    build:
      context: ./services/gateway
      dockerfile: Dockerfile.dev
    depends_on:
      - redis
    environment:
      REDIS_URL: redis://redis:6379/0
      LOG_LEVEL: INFO
      MAX_INGEST_FPS: "30"
      JPEG_QUALITY: "75"
      SESSION_IDLE_TIMEOUT_S: "10"
    ports:
      - "8000:8000"
    volumes:
      - ./services/gateway/app:/app/app
    networks:
      - internal

  inference-worker:
    profiles: ["dev"]
    build:
      context: ./services/inference-worker
      dockerfile: Dockerfile.dev
    depends_on:
      - redis
    environment:
      REDIS_URL: redis://redis:6379/0
      LOG_LEVEL: INFO
      MODELS_DIR: /models
      PROMPTS_FILE: /config/prompts.md
      DETECT_CONF: "0.35"
      DETECT_IOU: "0.5"
      DETECT_IMGSZ: "416"
      # zero_shot | probe | siglip_probe. siglip_probe needs a trained
      # probe artifact under /models/classifier-probe/probe_siglip.npz
      # (see services/inference-worker/scripts/TRAIN_PROBE.md).
      CLASSIFIER_MODE: siglip_probe
      SIGLIP_PROBE_PATH: /models/classifier-probe/probe_siglip.npz
      # HF cache for the SigLIP-2 weights. Bind-mounting the host's
      # ~/.cache/huggingface keeps the first cold-boot fast on
      # subsequent runs.
      HF_HOME: /root/.cache/huggingface
    volumes:
      - ./services/inference-worker/app:/app/app
      - ./services/inference-worker/app/models:/models:ro
      - ./docs/prompts.md:/config/prompts.md:ro
      - ${HOME}/.cache/huggingface:/root/.cache/huggingface
    networks:
      - internal

  # ---- prod profile ----
  # Production-image variants. Built from services/{gateway,inference-worker}/
  # Dockerfile (multi-stage, slim runtimes). No source bind-mounts —
  # everything the services need is inside the image:
  #   - gateway: SPA bundle baked at /app/static (from frontend-assets:dev).
  #   - inference-worker: OpenVINO models baked at /models.
  # The one exception is docs/prompts.md, mounted read-only as a
  # configmap-style override; in K8s (Phase 4) this becomes a real
  # ConfigMap. Local prod testing exercises the same /config/prompts.md
  # path the K8s manifest will use.
  gateway-prod:
    profiles: ["prod"]
    build:
      context: ./services/gateway
      dockerfile: Dockerfile
      args:
        FRONTEND_IMAGE: guitar-detect/frontend-assets:dev
    image: guitar-detect/gateway:dev
    depends_on:
      - redis
    environment:
      REDIS_URL: redis://redis:6379/0
      LOG_LEVEL: INFO
      MAX_INGEST_FPS: "30"
      JPEG_QUALITY: "75"
      SESSION_IDLE_TIMEOUT_S: "10"
    ports:
      - "8000:8000"
    networks:
      - internal

  inference-worker-prod:
    profiles: ["prod"]
    build:
      context: ./services/inference-worker
      dockerfile: Dockerfile
    image: guitar-detect/inference-worker:dev
    depends_on:
      - redis
    environment:
      REDIS_URL: redis://redis:6379/0
      LOG_LEVEL: INFO
      MODELS_DIR: /models
      PROMPTS_FILE: /config/prompts.md
      DETECT_CONF: "0.35"
      DETECT_IOU: "0.5"
      DETECT_IMGSZ: "416"
      # Production classifier. The image bakes SigLIP-2 weights into
      # the HF cache at build time; only the *trained probe head*
      # ships separately (it's tied to a specific dataset and tends
      # to be re-trained more often than the image is rebuilt).
      CLASSIFIER_MODE: siglip_probe
      SIGLIP_PROBE_PATH: /models/classifier-probe/probe_siglip.npz
    volumes:
      # configmap-style read-only overrides. K8s (Phase 4) replaces
      # these with real ConfigMaps / Secrets that mount the same paths.
      - ./docs/prompts.md:/config/prompts.md:ro
      # Trained probe head is dataset-derived and lives outside the
      # image. Re-training is `scripts/train_probe.py --backend siglip`
      # on the host, then restart this service to pick it up.
      - ./services/inference-worker/app/models/classifier-probe:/models/classifier-probe:ro
    networks:
      - internal

networks:
  internal:
    driver: bridge
