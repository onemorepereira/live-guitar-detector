# Guitar Detect Helm chart values.
#
# DESIGN.md §7.2 is the source of truth for this schema. The `namespace`
# key has been expanded from a bare string to {name, create} so the
# namespace can be optionally pre-created out-of-band (e.g. by the mkcert
# script).
#
# Override per-cluster bits via values.local.yaml; do not edit this file
# unless you are changing the chart contract.

namespace:
  name: guitar-detect
  create: true

image:
  registry: registry.local:5000      # local K3s registry
  pullPolicy: IfNotPresent
  tag: "0.1.0"

gateway:
  image: guitar-detect/gateway
  replicas: 1
  nodeSelector:
    workload: io
  resources:
    requests:
      cpu: "500m"
      memory: "512Mi"
    limits:
      cpu: "2"
      memory: "1Gi"
  env:
    LOG_LEVEL: INFO
    MAX_INGEST_FPS: "30"

inference:
  image: guitar-detect/inference-worker
  replicas: 1
  nodeSelector:
    workload: compute
  resources:
    requests:
      cpu: "3"
      memory: "2Gi"
    limits:
      cpu: "6"
      memory: "4Gi"
  env:
    DETECT_CONF: "0.35"
    DETECT_IMGSZ: "416"
    VOTE_WINDOW: "15"

redis:
  enabled: true
  # DESIGN.md §7.2 lists redis:7-alpine; pin a patch in values.local.yaml
  # if you want stricter version control.
  image: redis:7-alpine
  nodeSelector:
    workload: io
  storage:
    size: 1Gi
    storageClass: longhorn

ingress:
  enabled: true
  className: traefik
  host: guitars.home.lan
  tls:
    enabled: true
    secretName: guitars-tls

models:
  pvc:
    enabled: false    # default: baked into image
    size: 2Gi
    storageClass: longhorn

# Feature toggles for templates not yet authored — included so values.local.yaml
# can flip them safely as Tasks 4.5-4.8 land.
networkPolicies:
  enabled: true
