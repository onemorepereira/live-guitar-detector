{{- if .Values.networkPolicies.enabled }}
# Allow gateway ingress only from the Traefik ingress controller pods.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "guitar-detect.fullname" . }}-gateway-ingress
  namespace: {{ .Values.namespace.name }}
  labels:
    {{- include "guitar-detect.componentLabels" (dict "ctx" . "component" "gateway") | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "guitar-detect.componentSelectorLabels" (dict "ctx" . "component" "gateway") | nindent 6 }}
  policyTypes: ["Ingress"]
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              # Match the Traefik namespace by its kubernetes.io/metadata.name
              # label (set automatically by k8s 1.22+).
              kubernetes.io/metadata.name: {{ .Values.networkPolicies.traefikNamespace | quote }}
          podSelector:
            matchLabels:
              {{- toYaml .Values.networkPolicies.traefikPodLabels | nindent 14 }}
      ports:
        - protocol: TCP
          port: 8000
---
# Allow redis ingress only from gateway + inference pods in this namespace.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "guitar-detect.fullname" . }}-redis-ingress
  namespace: {{ .Values.namespace.name }}
  labels:
    {{- include "guitar-detect.componentLabels" (dict "ctx" . "component" "redis") | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "guitar-detect.componentSelectorLabels" (dict "ctx" . "component" "redis") | nindent 6 }}
  policyTypes: ["Ingress"]
  ingress:
    - from:
        - podSelector:
            matchLabels:
              {{- include "guitar-detect.componentSelectorLabels" (dict "ctx" . "component" "gateway") | nindent 14 }}
        - podSelector:
            matchLabels:
              {{- include "guitar-detect.componentSelectorLabels" (dict "ctx" . "component" "inference") | nindent 14 }}
      ports:
        - protocol: TCP
          port: 6379
---
# Inference worker is a pure consumer; deny all inbound traffic.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "guitar-detect.fullname" . }}-inference-ingress
  namespace: {{ .Values.namespace.name }}
  labels:
    {{- include "guitar-detect.componentLabels" (dict "ctx" . "component" "inference") | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "guitar-detect.componentSelectorLabels" (dict "ctx" . "component" "inference") | nindent 6 }}
  policyTypes: ["Ingress"]
  # Empty ingress list = deny all. The worker only initiates outbound to
  # redis; that is unaffected (no Egress policy defined).
{{- end }}
