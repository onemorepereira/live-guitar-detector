{{- if .Values.ingress.enabled }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "guitar-detect.fullname" . }}
  namespace: {{ .Values.namespace.name }}
  labels:
    {{- include "guitar-detect.labels" . | nindent 4 }}
spec:
  ingressClassName: {{ .Values.ingress.className | quote }}
  {{- if .Values.ingress.tls.enabled }}
  tls:
    - hosts: [{{ .Values.ingress.host | quote }}]
      secretName: {{ .Values.ingress.tls.secretName | quote }}
  {{- end }}
  rules:
    - host: {{ .Values.ingress.host | quote }}
      http:
        paths:
          # All paths go to the gateway; FastAPI dispatches between /api,
          # /ws, /healthz, /readyz, and the static SPA mount at /. Traefik
          # handles WebSocket upgrades automatically — no extra annotation
          # needed for /ws.
          - path: /
            pathType: Prefix
            backend:
              service:
                name: {{ include "guitar-detect.fullname" . }}-gateway
                port:
                  name: http
{{- end }}
