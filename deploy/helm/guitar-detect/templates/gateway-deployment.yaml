apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "guitar-detect.fullname" . }}-gateway
  namespace: {{ .Values.namespace.name }}
  labels:
    {{- include "guitar-detect.componentLabels" (dict "ctx" . "component" "gateway") | nindent 4 }}
spec:
  replicas: {{ .Values.gateway.replicas }}
  selector:
    matchLabels:
      {{- include "guitar-detect.componentSelectorLabels" (dict "ctx" . "component" "gateway") | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "guitar-detect.componentSelectorLabels" (dict "ctx" . "component" "gateway") | nindent 8 }}
    spec:
      {{- with .Values.gateway.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: gateway
          image: "{{ .Values.image.registry }}/{{ .Values.gateway.image }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: 8000
              protocol: TCP
          env:
            - name: REDIS_URL
              value: "redis://{{ include "guitar-detect.fullname" . }}-redis.{{ .Values.namespace.name }}.svc.cluster.local:6379/0"
            {{- range $k, $v := .Values.gateway.env }}
            - name: {{ $k }}
              value: {{ $v | quote }}
            {{- end }}
          readinessProbe:
            httpGet:
              path: /readyz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 5
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 10
            periodSeconds: 15
            failureThreshold: 3
          resources:
            {{- toYaml .Values.gateway.resources | nindent 12 }}
